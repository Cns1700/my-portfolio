<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEIKO // NEON ARCADE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Monoton&family=Rajdhani:wght@600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="token-counter-deck">
        <div class="hud-item">CREDITS: <span>02</span></div>
        <div class="hud-item">HI-SCORE: <span>993500</span></div>
    </div>

    <div class="cabinet-frame">
        
        <header class="arcade-header">
            <h1 class="neon-text-pulsing">MEIKO</h1>
            <div class="cabinet-subtitle">CRIMSON // STATION . 01</div>
        </header>

        <main class="arcade-screen">
            
            <section class="track-selection">
                <div class="section-title">SELECT TRACK</div>
                
                <div class="track-row active">
                    <span class="track-number">01</span>
                    <div class="track-meta">
                        <h3>Nostalogic</h3>
                        <p>MODULE: CRITIQUE</p>
                    </div>
                    <span class="difficulty">EXTREME</span>
                </div>

                <div class="track-row">
                    <span class="track-number">02</span>
                    <div class="track-meta">
                        <h3>Piano×Forte×Scandal</h3>
                        <p>MODULE: PHANTOM THIEF</p>
                    </div>
                    <span class="difficulty">HARD</span>
                </div>

                <div class="track-row">
                    <span class="track-number">03</span>
                    <div class="track-meta">
                        <h3>Change me</h3>
                        <p>MODULE: LORELEI</p>
                    </div>
                    <span class="difficulty">EXTREME</span>
                </div>
            </section>

            <section class="art-showcase-frame">
                <div class="image-viewport">
                    <div class="artwork-placeholder"> </div>
                </div>
                <div class="arcade-footer-cta">
                    <div class="insert-coin-text">PRESS START BUTTON // INSERT COIN</div>
                    <div class="rhythm-button-deck">
                        <button class="arcade-btn-node btn-red" title="Triangle">▲</button>
                        <button class="arcade-btn-node btn-blue" title="Square">■</button>
                        <button class="arcade-btn-node btn-yellow" title="Cross">✖</button>
                        <button class="arcade-btn-node btn-green" title="Circle">●</button>
                    </div>
                </div>
            </section>

        </main>
    </div>

</body>
</html>
